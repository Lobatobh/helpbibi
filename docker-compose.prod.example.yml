# Help Bibi — Docker Compose for Production Example (FASE 27)
# Copy to docker-compose.prod.yml, edit secrets, then: docker compose -f docker-compose.prod.yml up -d
# NEVER commit real secrets. Use .env.prod (gitignored) or Docker secrets.

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
        NEXT_PUBLIC_SOCKET_URL: ${NEXT_PUBLIC_SOCKET_URL}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rescue:
        condition: service_started
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://helpbibi:${POSTGRES_PASSWORD}@postgres:5432/helpbibi?schema=public
      POSTGRES_DATABASE_URL: postgresql://helpbibi:${POSTGRES_PASSWORD}@postgres:5432/helpbibi?schema=public
      REDIS_URL: redis://redis:6379
      RATE_LIMIT_BACKEND: redis
      AUDIT_LOG_BACKEND: database
      SESSION_SECRET: ${SESSION_SECRET}
      PAYMENT_WEBHOOK_SECRET: ${PAYMENT_WEBHOOK_SECRET}
      SOCKET_CORS_ORIGIN: ${SOCKET_CORS_ORIGIN}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
      NEXT_PUBLIC_SOCKET_URL: ${NEXT_PUBLIC_SOCKET_URL}
      RESCUE_SERVICE_URL: http://rescue:3003
      PAYMENT_GATEWAY_PROVIDER: simulated
    expose:
      - "3000"
    networks:
      - dokploy-network
    restart: unless-stopped

  rescue:
    build:
      context: .
      dockerfile: mini-services/rescue-service/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://helpbibi:${POSTGRES_PASSWORD}@postgres:5432/helpbibi?schema=public
      POSTGRES_DATABASE_URL: postgresql://helpbibi:${POSTGRES_PASSWORD}@postgres:5432/helpbibi?schema=public
      REDIS_URL: redis://redis:6379
      RATE_LIMIT_BACKEND: redis
      PAYMENT_GATEWAY_PROVIDER: simulated
      PAYMENT_WEBHOOK_SECRET: ${PAYMENT_WEBHOOK_SECRET}
      SOCKET_CORS_ORIGIN: ${SOCKET_CORS_ORIGIN}
      RESCUE_SERVICE_PORT: 3003
    expose:
      - "3003"
    networks:
      - dokploy-network
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: helpbibi
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: helpbibi
    volumes:
      - helpbibi-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U helpbibi -d helpbibi"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dokploy-network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dokploy-network
    restart: unless-stopped

volumes:
  helpbibi-postgres:

networks:
  dokploy-network:
    external: true
