# ============================================================
# Help Bibi — Docker Compose for staging/local
# ============================================================
# Dokploy/Traefik routes traffic to the app container on port 3000.
# Do not publish 3000 or 3003 directly on the host.
#
# Services:
#   app      — Next.js web app (port 3000)
#   rescue   — Socket.IO rescue service (port 3003)
#
# Uses PostgreSQL and Redis services owned by this compose.
# Dokploy should route to the internal app port 3000.
#
# In Dokploy: use this compose file, expose port 3000 via Traefik.
# The rescue-service runs on internal port 3003 (not exposed externally).

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: helpbibi
      POSTGRES_USER: helpbibi
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - helpbibi-postgres:/var/lib/postgresql/data
    networks:
      - dokploy-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U helpbibi -d helpbibi"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    networks:
      - dokploy-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  rescue:
    build:
      context: .
      dockerfile: mini-services/rescue-service/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://helpbibi:${POSTGRES_PASSWORD}@postgres:5432/helpbibi?schema=public
      POSTGRES_DATABASE_URL: postgresql://helpbibi:${POSTGRES_PASSWORD}@postgres:5432/helpbibi?schema=public
      REDIS_URL: redis://redis:6379
      RATE_LIMIT_BACKEND: redis
      AUDIT_LOG_BACKEND: database
      PAYMENT_GATEWAY_PROVIDER: simulated
      PAYMENT_WEBHOOK_SECRET: ${PAYMENT_WEBHOOK_SECRET}
      SESSION_SECRET: ${SESSION_SECRET}
      SOCKET_CORS_ORIGIN: ${SOCKET_CORS_ORIGIN}
      RESCUE_SERVICE_PORT: 3003
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    expose:
      - "3003"
    networks:
      - dokploy-network

  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
        NEXT_PUBLIC_SOCKET_URL: ${NEXT_PUBLIC_SOCKET_URL}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://helpbibi:${POSTGRES_PASSWORD}@postgres:5432/helpbibi?schema=public
      POSTGRES_DATABASE_URL: postgresql://helpbibi:${POSTGRES_PASSWORD}@postgres:5432/helpbibi?schema=public
      REDIS_URL: redis://redis:6379
      RATE_LIMIT_BACKEND: redis
      AUDIT_LOG_BACKEND: database
      PAYMENT_GATEWAY_PROVIDER: simulated
      PAYMENT_WEBHOOK_SECRET: ${PAYMENT_WEBHOOK_SECRET}
      SESSION_SECRET: ${SESSION_SECRET}
      SOCKET_CORS_ORIGIN: ${SOCKET_CORS_ORIGIN}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
      NEXT_PUBLIC_SOCKET_URL: ${NEXT_PUBLIC_SOCKET_URL}
      RESCUE_SERVICE_URL: http://rescue:3003
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rescue:
        condition: service_started
    expose:
      - "3000"
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=dokploy-network"
      - "traefik.http.routers.helpbibi-web.entrypoints=web"
      - "traefik.http.routers.helpbibi-web.rule=Host(`helpbibi.com`) || Host(`www.helpbibi.com`)"
      - "traefik.http.routers.helpbibi-web.middlewares=redirect-to-https@file"
      - "traefik.http.routers.helpbibi-web.service=helpbibi-web"
      - "traefik.http.services.helpbibi-web.loadbalancer.server.port=3000"
      - "traefik.http.routers.helpbibi-websecure.entrypoints=websecure"
      - "traefik.http.routers.helpbibi-websecure.rule=Host(`helpbibi.com`) || Host(`www.helpbibi.com`)"
      - "traefik.http.routers.helpbibi-websecure.service=helpbibi-websecure"
      - "traefik.http.routers.helpbibi-websecure.tls.certresolver=letsencrypt"
      - "traefik.http.services.helpbibi-websecure.loadbalancer.server.port=3000"
    networks:
      - dokploy-network

volumes:
  helpbibi-postgres:

networks:
  dokploy-network:
    external: true
