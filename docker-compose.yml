# ============================================================
# Help Bibi — Docker Compose for staging/local
# ============================================================
# Usage:
#   docker compose up --build
#
# Services:
#   app      — Next.js web app (port 3000)
#   rescue   — Socket.IO rescue service (port 3003)
#
# Both services share the same SQLite DB file via volume.
# For production with PostgreSQL, see docker-compose.postgres.yml
#
# In Dokploy: use this compose file, expose port 3000 via Traefik.
# The rescue-service runs on internal port 3003 (not exposed externally).

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=file:/app/db/custom.db
      - PAYMENT_GATEWAY_PROVIDER=${PAYMENT_GATEWAY_PROVIDER:-simulated}
      - PAYMENT_WEBHOOK_SECRET=${PAYMENT_WEBHOOK_SECRET:-dev_webhook_secret_change_me}
      - SESSION_SECRET=${SESSION_SECRET:-change_me_to_a_random_64_char_string}
      - SOCKET_CORS_ORIGIN=${SOCKET_CORS_ORIGIN:-http://localhost:3000}
      - NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
      - NEXT_PUBLIC_SOCKET_URL=/
      - RESCUE_SERVICE_URL=http://rescue:3003
    volumes:
      - helpbibi-db:/app/db
    depends_on:
      rescue:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3

  rescue:
    build:
      context: .
      dockerfile: mini-services/rescue-service/Dockerfile
    ports:
      - "3003:3003"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=file:/app/db/custom.db
      - PAYMENT_GATEWAY_PROVIDER=${PAYMENT_GATEWAY_PROVIDER:-simulated}
      - PAYMENT_WEBHOOK_SECRET=${PAYMENT_WEBHOOK_SECRET:-dev_webhook_secret_change_me}
      - SOCKET_CORS_ORIGIN=${SOCKET_CORS_ORIGIN:-http://localhost:3000}
      - RESCUE_SERVICE_PORT=3003
    volumes:
      - helpbibi-db:/app/db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "bun", "-e", "const s = require('net').connect(3003, 'localhost'); s.on('connect', () => { s.end(); process.exit(0) }); s.on('error', () => process.exit(1)); setTimeout(() => process.exit(1), 3000)"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

volumes:
  helpbibi-db:
    driver: local

